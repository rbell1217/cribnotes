<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="CribNotes - context-aware childcare guide for parents and babysitters">
    <meta name="theme-color" content="#1A1A1A">
    <title>CribNotes</title>

    <!-- One-time cache-bust: when CRIBNOTES_VERSION advances, force every
         device to drop its old service worker + caches and reload once.
         This guarantees users pick up fixes like the dictation pipeline
         without having to manually clear site data. -->
    <script>
      (function bustStaleCache() {
        var LATEST = 'v9-label-value-cards-2026-05-11';
        try {
          var stored = localStorage.getItem('cribnotes-version');
          if (stored === LATEST) return;
          if (sessionStorage.getItem('cribnotes-bust-in-progress') === LATEST) {
            // Already busted this session, just record version and continue
            localStorage.setItem('cribnotes-version', LATEST);
            return;
          }
          sessionStorage.setItem('cribnotes-bust-in-progress', LATEST);
          var tasks = [];
          if ('serviceWorker' in navigator) {
            tasks.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            }).catch(function () {}));
          }
          if ('caches' in window) {
            tasks.push(caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }).catch(function () {}));
          }
          Promise.all(tasks).then(function () {
            localStorage.setItem('cribnotes-version', LATEST);
            location.reload();
          });
        } catch (e) {
          // localStorage might be disabled (private mode); fail silently.
        }
      })();
    </script>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Editorial type stack inspired by WeTransfer:
         Fraunces (variable serif) for display headlines; Inter for body UI. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&family=Inter:wght@400;500;600;700&display=swap">

    <link rel="stylesheet" href="css/styles.css">

    <!-- Firebase SDK v9 Compat (via CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <!-- PDF.js for reading uploaded PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    </script>
    <!-- Mammoth.js for reading uploaded Word docs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
      /* Pre-app diagnostic boot screen so the user never sees a white page */
      #boot-screen {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #F5EFE6; padding: 24px; z-index: 999;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #boot-screen .boot-card {
        max-width: 520px; background: white; border-radius: 28px; padding: 36px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      }
      #boot-screen h1 {
        color: #1A1A1A; margin: 0 0 12px;
        font-family: 'Fraunces', Georgia, serif;
        font-weight: 700; font-size: 2.4rem; letter-spacing: -0.02em;
      }
      #boot-screen p { color: #444; line-height: 1.5; margin: 8px 0; }
      #boot-screen pre {
        background: #1A1A1A; color: #fff; padding: 12px 14px; border-radius: 8px;
        font-size: 0.9em; overflow: auto; margin: 12px 0;
      }
      #boot-screen .ok { color: #2A9D8F; font-weight: 600; }
      #boot-screen .warn { color: #8C2A1A; font-weight: 600; }
      #boot-screen ol { padding-left: 20px; }
      #boot-screen li { margin: 4px 0; }
    </style>
</head>
<body>
    <div id="boot-screen">
      <div class="boot-card">
        <h1>CribNotes</h1>
        <p id="boot-status">Starting up...</p>
        <div id="boot-detail"></div>
      </div>
    </div>

    <div id="app-root"></div>
    <div id="emergency-portal"></div>
    <div id="overlay-portal"></div>

    <script>
      (function bootDiagnose() {
        var status = document.getElementById('boot-status');
        var detail = document.getElementById('boot-detail');

        function fail(msg, html) {
          status.innerHTML = '<span class="warn">' + msg + '</span>';
          if (html) detail.innerHTML = html;
        }

        if (location.protocol === 'file:') {
          fail('CribNotes needs to be served from a local web server.',
            '<p>You opened the file directly with a double-click. Browsers block ES modules and service workers loaded via <code>file://</code>.</p>' +
            '<p>Open Terminal in the <code>cribnotes-app</code> folder and run:</p>' +
            '<pre>python3 -m http.server 8000</pre>' +
            '<p>Then visit <a href="http://localhost:8000">http://localhost:8000</a>.</p>');
          return;
        }

        if (typeof firebase === 'undefined') {
          fail('Firebase SDK did not load.',
            '<p>Check that you have an internet connection. CribNotes loads Firebase from Google\'s CDN.</p>');
          return;
        }

        setTimeout(function () {
          if (document.getElementById('boot-screen')) {
            var msg = 'App started but never finished initializing.';
            var hint = '<p>Open DevTools Console (Cmd-Option-J) and look for an error.</p>' +
              '<p>Common causes:</p>' +
              '<ol>' +
                '<li>Firebase not configured yet &mdash; edit <code>js/config.js</code> with your project credentials.</li>' +
                '<li>An ES module import failed &mdash; the Console will show the exact file.</li>' +
                '<li>The browser is too old (CribNotes needs Chrome 105+, Safari 15.4+, Firefox 121+).</li>' +
              '</ol>';
            status.innerHTML = '<span class="warn">' + msg + '</span>';
            detail.innerHTML = hint;
          }
        }, 6000);
      })();
    </script>

    <script type="module" src="js/app.js"></script>

    <script>
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function (err) {
            console.warn('[CribNotes] Service worker registration failed:', err);
          });
        });
      }
    </script>
</body>
</html>
